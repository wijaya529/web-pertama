<!DOCTYPE html>
<html>
<head>
  <title>Prasetyo Season</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .owl {
      font-size: 80px;
      margin: 20px 0;
      filter: drop-shadow(0 0 15px #00ffff);
    }

    p {
      color: #aaa;
      font-size: 26px;
    }

    /* tombol (dipindah ke CSS biar rapi) */
    button {
      margin: 10px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00c6ff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo">

    <div class="owl">7</div>
    <h1>PRASETYO SEASON</h1>
    <p>Bangun personal branding yang kuat dan dikenal luas bersama kami</p>

    <p id="welcome"></p>
    <div id="buttons"></div>
  </div>

<script>
  // teks welcome
  document.getElementById("welcome").innerText =
    "Selamat datang di Prasetyo Season";

  // bikin tombol
  const visitBtn = document.createElement("button");
  visitBtn.innerText = "Visit";

  const joinBtn = document.createElement("button");
  joinBtn.innerText = "Join";

  // fungsi tombol
  visitBtn.onclick = function () {
    window.location.href = "https://www.instagram.com/heri_529?igsh=dTFzMDVkaGRkbW1k";
  };

  joinBtn.onclick = function () {
    alert("Join dulu bro 🚀");
  };

  // masukin ke halaman
  const buttonContainer = document.getElementById("buttons");
  buttonContainer.appendChild(visitBtn);
  buttonContainer.appendChild(joinBtn);
</script>

</body>
</html>
