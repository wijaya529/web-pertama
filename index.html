<!DOCTYPE html>
<html>
<head>
  <title>Prasetyo Seaseon</title>
  
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .owl {
      font-size: 80px;
      margin: 20px 0;
      filter: drop-shadow(0 0 15px #00ffff);
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo">
    
    <div class="owl">7</div>
    <h1>PRASETYO SEASON </h1>
    <p>Modern • Mysterious • Powerful</p>
    <p id="welcome"></p>
<div id="buttons"></div>
  </div>

<script>

  document.getElementById("welcome").innerText =
    "Selamat datang di Prasetyo Capital 🔥";

  // bikin tombol
  const visitBtn = document.createElement("button");
  visitBtn.innerText = "Visit";

  const joinBtn = document.createElement("button");
  joinBtn.innerText = "Join";

  // styling dikit biar gak jelek
 visitBtn.style.margin = "10px";
visitBtn.style.padding = "15px 40px";
visitBtn.style.fontSize = "20px";
visitBtn.style.fontWeight = "bold";
visitBtn.style.background = "linear-gradient(135deg, #007bff, #00c6ff)";
visitBtn.style.color = "white";
visitBtn.style.border = "none";
visitBtn.style.borderRadius = "30px";

joinBtn.style.margin = "10px";
joinBtn.style.padding = "15px 40px";
joinBtn.style.fontSize = "20px";
joinBtn.style.fontWeight = "bold";
joinBtn.style.background = "linear-gradient(135deg, #007bff, #00c6ff)";
joinBtn.style.color = "white";
joinBtn.style.border = "none";
joinBtn.style.borderRadius = "30px";
  // fungsi tombol
  visitBtn.onclick = function () {
    window.location.href = "https://www.instagram.com/heri_529?igsh=dTFzMDVkaGRkbW1k"; // ganti link lu
  };

  joinBtn.onclick = function () {
    alert("Join dulu bro 🚀");
  };

  // masukin ke halaman
 document.getElementById("buttons").appendChild(visitBtn);
document.getElementById("buttons").appendChild(joinBtn);
</script>
