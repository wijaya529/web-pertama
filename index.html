<!DOCTYPE html>
<html>
<head>
  <title>Prasetyo Capital</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .owl {
      font-size: 80px;
      margin: 20px 0;
      filter: drop-shadow(0 0 15px #00ffff);
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo">
    
    <div class="owl">7</div>
    <h1>PRASETYO PROTOKOL</h1>
    <p>Modern • Mysterious • Powerful</p>
  </div>
   <p id="welcome"></p>

<script>
 <script>
  document.getElementById("welcome").innerText =
    "Selamat datang di Prasetyo Capital 🔥";

  // bikin tombol
  const visitBtn = document.createElement("button");
  visitBtn.innerText = "Visit";

  const joinBtn = document.createElement("button");
  joinBtn.innerText = "Join";

  // styling dikit biar gak jelek
  visitBtn.style.margin = "10px";
  visitBtn.style.padding = "10px 20px";

  joinBtn.style.margin = "10px";
  joinBtn.style.padding = "10px 20px";

  // fungsi tombol
  visitBtn.onclick = function () {
    window.location.href = "https://google.com"; // ganti link lu
  };

  joinBtn.onclick = function () {
    alert("Join dulu bro 🚀");
  };

  // masukin ke halaman
  document.body.appendChild(visitBtn);
  document.body.appendChild(joinBtn);
</script>
