<!DOCTYPE html>
<html>
<head>
  <title>Prasetyo Season</title>
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      font-family: Arial, sans-serif;
      color: white;
    }

    /* PROJEKC pojok KIRI BAWAH */
    .projek-box {
      position: fixed;
      bottom: 20px;
      left: 20px;
      text-align: left;
      z-index: 10;
    }

    .projek-box h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
      color: #00c6ff;
      letter-spacing: 2px;
    }

    .projek-box p {
      margin: 5px 0;
      color: #aaa;
      font-size: 16px;
    }

    /* Konten tengah */
    .center-wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    p {
      color: #aaa;
      font-size: 26px;
    }

    .logo-video {
      width: 440px;
      border-radius: 15px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px #00c6ff);
    }

    button {
      margin: 10px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00c6ff;
    }

    /* OUR WEBSITE pojok KANAN BAWAH */
    .website-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-align: right;
      z-index: 10;
    }

    .website-box h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
      color: #00c6ff;
      letter-spacing: 2px;
    }

    .website-box p {
      margin: 5px 0;
      color: #aaa;
      font-size: 16px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- PROJEKC di KIRI BAWAH -->
  <div class="projek-box">
    <h2>PROJEKC</h2>
    <p>SPEKTER AGNECY</p>
    <p>ARC</p>
    <p>IOPN NETWORK</p>
  </div>

  <!-- Konten utama di tengah -->
  <div class="center-wrapper">
    <div class="container">
      <h1>7</h1>
      <h1>PRASETYO SEASON</h1>
      <p>KLIK BAWAH ITU BRO</p>
      <p>Selamat datang di Prasetyo Season</p>
      <button>Visit</button>
      <button>Join</button>
    </div>
  </div>

  <!-- OUR WEBSITE di KANAN BAWAH -->
  <div class="website-box">
    <h2>OUR WEBSITE</h2>
    <p>JUS SEGAR</p>
    <p>SHAFIRA HIJAB</p>
  </div>

</body>
</html>
