<!DOCTYPE html>
<html>
<head>
  <title>Prasetyo Season</title>
    <link rel="icon" type="image/png" href="logo.png">


  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .owl {
      font-size: 80px;
      margin: 20px 0;
      filter: drop-shadow(0 0 15px #00ffff);
    }

    p {
      color: #aaa;
      font-size: 26px;
    }

    .logo-video {
      width: 440px;
      border-radius: 15px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px #00c6ff);
    }

    button {
      margin: 10px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00c6ff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO VIDEO (SUDAH GANTI DARI IMG) -->
    <video autoplay muted loop class="logo-video">
      <source src="logo.mp4" type="video/mp4">
    </video>

    <div class="owl">7</div>

    <h1>PRASETYO SEASON</h1>

    <p>KLIK BAWAH ITU BRO</p>

    <p id="welcome"></p>

    <div id="buttons"></div>

  </div>

<div style="text-align: left; display: inline-block;">
  <h2>PROJEKC</h2>
  <p>SPEKTER AGNECY</p>
  <p>ARC</p>
  <p>IOPN NETWORK</p>

  <H2>OUR WEBSITE </H2>
  <p>JUS SEGAR </p>
  <P>SHAFIRA HIJAB</P>
</div>


<script>
  document.getElementById("welcome").innerText =
    "Selamat datang di Prasetyo Season";

  const visitBtn = document.createElement("button");
  visitBtn.innerText = "Visit";

  const joinBtn = document.createElement("button");
  joinBtn.innerText = "Join";

  visitBtn.onclick = function () {
    window.location.href = "https://www.instagram.com/heri_529?igsh=dTFzMDVkaGRkbW1k";
  };

  joinBtn.onclick = function () {
    alert("Join dulu bro 🚀");
  };

  const buttonContainer = document.getElementById("buttons");
  buttonContainer.appendChild(visitBtn);
  buttonContainer.appendChild(joinBtn);
</script>

</body>
</html>
